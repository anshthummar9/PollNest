{% extends 'polls/base.html' %}
{% load static %}

{% block title %}Login - PollNest{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card auth-card shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h1 class="fw-bold text-primary mb-3">
                        <i class="bi bi-pie-chart-fill"></i> PollNest
                    </h1>
                    <i class="bi bi-person-circle text-primary" style="font-size: 4rem;"></i>
                    <h2 class="mt-3 mb-2">Welcome Back!</h2>
                    <p class="text-muted">Login to vote on polls</p>
                </div>

                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="bi bi-person"></i> Username
                        </label>
                        <input type="text" class="form-control form-control-lg" id="username" name="username" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock"></i> Password
                        </label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password"
                            required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </button>
                </form>

                <hr class="my-4">

                <p class="text-center mb-0">
                    Don't have an account?
                    <a href="{% url 'polls:register' %}" class="text-decoration-none fw-bold">Register here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
